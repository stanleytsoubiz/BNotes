<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>BNotes Admin — 焙學·原豆誌 後台管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif; background: #fdf8f2; color: #1a1a1a; }
    .admin-loading {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 40px;
    }
    .admin-logo { font-size: 1.5rem; font-weight: 800; color: #c47e2b; margin-bottom: 8px; }
    .admin-logo span { color: #1a1a1a; }
    .admin-sub { font-size: 0.9rem; color: #666; margin-bottom: 36px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #f0e8de; border-top-color: #c47e2b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.85rem; color: #999; }
    /* Quick links */
    .quick-links {
      position: fixed; top: 1rem; right: 1rem; z-index: 9999;
      display: flex; gap: .5rem;
    }
    .ql-btn {
      background: #c47e2b; color: #fff; text-decoration: none;
      font-size: .78rem; font-weight: 700; padding: .4rem 1rem; border-radius: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); transition: opacity .2s;
    }
    .ql-btn:hover { opacity: .85; }
    .ql-btn.secondary {
      background: #fff; color: #c47e2b; border: 1.5px solid #c47e2b;
    }
  </style>
</head>
<body>
  <!-- 快速入口：文章管理 -->
  <div class="quick-links">
    <a class="ql-btn secondary" href="/admin/articles.html">📋 文章管理</a>
  </div>

  <div class="admin-loading" id="loading-screen">
    <div class="admin-logo">BNotes <span>焙學·原豆誌</span></div>
    <div class="admin-sub">後台管理系統</div>
    <div class="spinner"></div>
    <div class="loading-text">正在載入 Admin 介面...</div>
  </div>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // 載入完成後隱藏 loading screen
    window.addEventListener('load', function() {
      var loading = document.getElementById('loading-screen');
      if (loading) { loading.style.display = 'none'; }
    });
  </script>
</body>
</html>
