name: Deploy BNotes to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Strip YAML frontmatter from articles
        run: node 05_Scripts/strip-frontmatter.js

      - name: Validate new/modified articles (quality gate)
        run: |
          # 只驗證本次 commit 新增或修改的文章，不影響既有文章
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'dist/articles/*.html' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️  本次無文章變動，跳過驗證"
            exit 0
          fi
          FAIL=0
          for f in $CHANGED; do
            [ -f "$f" ] || continue
            SLUG=$(basename "$f" .html)
            RESULT=$(node 05_Scripts/validate-article.js "$SLUG" 2>&1)
            if echo "$RESULT" | grep -q "BLOCK"; then
              echo "❌ BLOCK: $SLUG"
              echo "$RESULT" | grep "BLOCK"
              FAIL=1
            else
              echo "✅ OK: $SLUG"
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "::error::有文章未通過品質驗證（BLOCK），請修正後重新 push"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          # Use short SHA as commit-message to avoid Cloudflare API rejecting
          # special chars (< > CJK etc.) in the git commit body  [code: 8000111]
          SHORT_SHA=$(git rev-parse --short HEAD)
          # IMPORTANT: Deploy from repo root so wrangler.toml + functions/ are included
          # wrangler.toml sets pages_build_output_dir = "./dist"
          # functions/ directory at repo root is auto-detected for Cloudflare Pages Functions
          npx wrangler pages deploy ./dist \
            --project-name=bnotes \
            --branch=main \
            --commit-dirty=true \
            --commit-message="deploy: ${SHORT_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Submit Sitemap to Google & Bing
        continue-on-error: true
        run: |
          pip install google-api-python-client google-auth --quiet
          python3 05_Scripts/ci-submit-sitemap.py
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}

      - name: Write publish log
        continue-on-error: true
        run: |
          git config user.name "BNotes CI"
          git config user.email "ci@bnotescoffee.com"
          DATE=$(date '+%Y-%m-%d')
          SHA=$(git rev-parse --short HEAD)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'dist/articles/*.html' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️  無新文章，跳過 publish log"
            exit 0
          fi
          LOG_FILE="05_Scripts/PUBLISH_LOG.md"
          # 建立標頭（若檔案不存在）
          if [ ! -f "$LOG_FILE" ]; then
            echo "# BNotes 文章發布日誌" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "| 日期 | Slug | QC | GSC | Bing | Commit |" >> "$LOG_FILE"
            echo "|------|------|-----|-----|------|--------|" >> "$LOG_FILE"
          fi
          for f in $CHANGED; do
            [ -f "$f" ] || continue
            SLUG=$(basename "$f" .html)
            echo "| $DATE | $SLUG | ✅ Pass | ✅ | ✅ | $SHA |" >> "$LOG_FILE"
          done
          git add "$LOG_FILE"
          git diff --cached --quiet || git commit -m "log: 自動記錄文章發布 $DATE [$SHA]"
          git push origin main
