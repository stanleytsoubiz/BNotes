name: Deploy BNotes to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Strip YAML frontmatter from articles
        run: node 05_Scripts/strip-frontmatter.js

      - name: Deploy to Cloudflare Pages
        run: |
          # Use short SHA as commit-message to avoid Cloudflare API rejecting
          # special chars (< > CJK etc.) in the git commit body  [code: 8000111]
          SHORT_SHA=$(git rev-parse --short HEAD)
          # IMPORTANT: Deploy from repo root so wrangler.toml + functions/ are included
          # wrangler.toml sets pages_build_output_dir = "./dist"
          # functions/ directory at repo root is auto-detected for Cloudflare Pages Functions
          npx wrangler pages deploy \
            --project-name=bnotes \
            --branch=main \
            --commit-dirty=true \
            --commit-message="deploy: ${SHORT_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
