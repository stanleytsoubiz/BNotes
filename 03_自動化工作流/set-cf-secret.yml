name: "🔑 Set Cloudflare Pages Secret"

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Secret 名稱"
        required: true
        default: "SUBMIT_AI_KEY"
      secret_value:
        description: "Secret 值"
        required: true

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Set Cloudflare Pages Secret via Wrangler
        run: |
          echo "${{ github.event.inputs.secret_value }}" | \
          npx wrangler@latest pages secret put "${{ github.event.inputs.secret_name }}" \
            --project-name=bnotes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify secret was set
        run: |
          echo "✅ Secret '${{ github.event.inputs.secret_name }}' 已設定至 Cloudflare Pages project: bnotes"
          echo "下一步：觸發 Redeploy 讓新 Secret 生效"
